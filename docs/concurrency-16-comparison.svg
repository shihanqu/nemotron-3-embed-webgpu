<svg xmlns="http://www.w3.org/2000/svg" width="940" height="590" viewBox="0 0 940 590" role="img" aria-labelledby="title desc">
  <title id="title">16-concurrent aggregate throughput (requests/second)</title>
  <desc id="desc">Horizontal bars compare aggregate requests per second with 16 simultaneous requests for LM Studio and the custom WebGPU runtime at six exact token counts.</desc>
